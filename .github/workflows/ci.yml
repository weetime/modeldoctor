name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: modeldoctor
          POSTGRES_PASSWORD: modeldoctor
          POSTGRES_DB: modeldoctor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://modeldoctor:modeldoctor@localhost:5432/modeldoctor_test
      JWT_ACCESS_SECRET: ci-test-secret-with-at-least-32-characters-long-xyz
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: warn
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @modeldoctor/api exec prisma generate
      - run: pnpm -F @modeldoctor/api exec prisma migrate deploy
      # Build workspace packages so apps/api can resolve their package.json
      # `main`/`types` (which point to dist/) when type-checking under
      # `moduleResolution: "node"`. Without this, apps/api type-check fails
      # with "Cannot find module '@modeldoctor/tool-adapters'" because dist/
      # is gitignored and `pnpm install` doesn't trigger workspace builds.
      - run: pnpm -F @modeldoctor/contracts build
      - run: pnpm -F @modeldoctor/tool-adapters build
      - run: pnpm -r type-check
      - run: pnpm lint
      - run: pnpm -r test
      - run: pnpm -F @modeldoctor/api test:e2e
      - run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: modeldoctor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
