name: benchmark-runner

on:
  pull_request:
    paths:
      - 'apps/benchmark-runner/**'
      - '.github/workflows/benchmark-runner.yml'
  push:
    branches: [main]
    paths:
      - 'apps/benchmark-runner/**'
      - '.github/workflows/benchmark-runner.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/benchmark-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/benchmark-runner/pyproject.toml
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: python
    strategy:
      fail-fast: false
      matrix:
        tool: [guidellm, vegeta, genai-perf]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.tool }} image (no push)
        uses: docker/build-push-action@v5
        with:
          context: apps/benchmark-runner
          file: apps/benchmark-runner/images/${{ matrix.tool }}.Dockerfile
          push: false
          tags: modeldoctor/benchmark-runner-${{ matrix.tool }}:ci
          cache-from: type=gha,scope=${{ matrix.tool }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tool }}
